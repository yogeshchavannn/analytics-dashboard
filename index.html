<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f7fb;
    margin:0;
    padding:40px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    margin-bottom:20px;
}

input[type=file]{
    margin-top:10px;
}

.stats{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.stat-box{
    background:#eef2ff;
    padding:15px;
    border-radius:10px;
    min-width:150px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
}

th{
    background:#f3f4f6;
}
</style>

</head>
<body>

<div class="container">

```
<h1>Analytics Dashboard</h1>

<div class="card">
    <h3>Upload CSV File</h3>
    <input type="file" id="csvFile" accept=".csv">
</div>

<div class="card">
    <div class="stats">
            <div class="stat-box">
    <strong>Avg Pre GPA</strong>
    <div id="avgPreGPA">-</div>
</div>

<div class="stat-box">
    <strong>Avg Post GPA</strong>
    <div id="avgPostGPA">-</div>
</div>

<div class="stat-box">
    <strong>Avg AI Hours</strong>
    <div id="avgAIHours">-</div>
</div>

<div class="stat-box">
    <strong>Avg Skill Retention</strong>
    <div id="avgRetention">-</div>
</div>
            <strong>Dataset</strong>
            <div id="datasetName">-</div>
        </div>

        <div class="stat-box">
            <strong>Rows</strong>
            <div id="rowCount">0</div>
        </div>

        <div class="stat-box">
            <strong>Columns</strong>
            <div id="columnCount">0</div>
        </div>
    </div>
</div>

<div class="card">
    <h3>Data Preview</h3>
    <div id="tableContainer"></div>
</div>
```

</div>

<script>

document.getElementById("csvFile").addEventListener("change", 
                                                    function(event){const file = event.target.files[0];

    if(!file) return;

    document.getElementById("datasetName").innerText = file.name;

    Papa.parse(file,{

        header:true,

        complete:function(results){

            const data = results.data;

            document.getElementById("rowCount").innerText = data.length;
            calculateKPIs(data);

            document
            .getElementById("columnCount")
            .innerText =
            Object.keys(data[0]).length;

            renderTable(data);

        }

    });

});
  function calculateKPIs(data){

const average = (columnName) => {

    const values = data
    .map(row => parseFloat(row[columnName]))
    .filter(value => !isNaN(value));

    if(values.length === 0) return 0;

    return values.reduce(
        (sum,value)=>sum+value,0
    ) / values.length;
};

document.getElementById("avgPreGPA")
.innerText =
average("Pre_Semester_GPA").toFixed(2);

document.getElementById("avgPostGPA")
.innerText =
average("Post_Semester_GPA").toFixed(2);

document.getElementById("avgAIHours")
.innerText =
average("Weekly_GenAI_Hours").toFixed(2);

document.getElementById("avgRetention")
.innerText =
average("Skill_Retention_Score").toFixed(2);

}


function renderTable(data){

    if(data.length===0) return;

    let table =
    "<table><thead><tr>";

    Object.keys(data[0]).forEach(col=>{
        table += `<th>${col}</th>`;
    });

    table += "</tr></thead><tbody>";

    data.slice(0,10).forEach(row=>{

        table += "<tr>";

        Object.values(row).forEach(value=>{
            table += `<td>${value}</td>`;
        });

        table += "</tr>";

    });

    table += "</tbody></table>";

    document
    .getElementById("tableContainer")
    .innerHTML = table;
}

</script>

</body>
</html>
